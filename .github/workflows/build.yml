name: Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build
      run: pyinstaller --onefile tracker.py

    - uses: actions/upload-artifact@v4
      with:
        name: mikestrackerrobot
        path: dist/*.exe
