name: Build Tracker EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install pandas selenium undetected-chromedriver pyinstaller

    - name: Build
      run: |
        pyinstaller --onefile --collect-all undetected_chromedriver tracker.py

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: DPD Tracker
        path: dist/tracker.exe
